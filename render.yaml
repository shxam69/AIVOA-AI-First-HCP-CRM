services:
  # ── Backend ─────────────────────────────────────────────────────────────────
  - type: web
    name: aivoa-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in the Render dashboard
      - key: GROQ_API_KEY
        sync: false          # Set manually in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_URL
        sync: false          # Set to your Render static site URL after deploy

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: aivoa-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set to your backend service URL, e.g. https://aivoa-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
